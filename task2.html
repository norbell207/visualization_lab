<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Task 2 - Nhiệt độ theo vùng</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; }
        .controls { margin-bottom: 20px; }
        .controls select { padding: 5px; font-size: 14px; }
        .bar { fill: #718096; transition: fill 0.3s; }
        .bar-national { fill: #e53e3e; }
        .bar:hover, .bar-national:hover { opacity: 0.8; cursor: pointer; }
        #tooltip { position: absolute; background: rgba(0,0,0,0.8); color: #fff; padding: 8px; border-radius: 4px; opacity: 0; pointer-events: none; font-size: 13px; }
    </style>
</head>
<body>
    <div class="controls">
        <label><strong>Lọc Vùng:</strong></label>
        <select id="regionFilter">
            <option value="All">-- Tất cả các vùng --</option>
            <option value="Đồng Bằng Sông Cửu Long">Đồng Bằng Sông Cửu Long</option>
            <option value="Đông Nam Bộ">Đông Nam Bộ</option>
            <option value="Trung du và miền núi Bắc Bộ">Trung du và miền núi Bắc Bộ</option>
            <option value="Đồng Bằng Sông Hồng">Đồng Bằng Sông Hồng</option>
            <option value="Bắc Trung Bộ và Duyên hải miền Trung">Bắc Trung Bộ và Duyên hải miền Trung</option>
            <option value="Tây Nguyên">Tây Nguyên</option>
        </select>
    </div>
    <div id="chart"></div>
    <div id="tooltip"></div>

    <script>
        const NATIONAL_AVG_TEMP = 25.1;
        const rawData = [
            {"region": "Bắc Trung Bộ và Duyên hải miền Trung", "temp": 25.6}, {"region": "Trung du và miền núi Bắc Bộ", "temp": 22.3}, {"region": "Tây Nguyên", "temp": 22.8}, {"region": "Đông Nam Bộ", "temp": 27.8}, {"region": "Đồng Bằng Sông Cửu Long", "temp": 27.6}, {"region": "Đồng Bằng Sông Hồng", "temp": 24.6}
        ];

        const margin = {top: 20, right: 20, bottom: 80, left: 40}, width = 700 - margin.left - margin.right, height = 350 - margin.top - margin.bottom;
        const svg = d3.select("#chart").append("svg").attr("width", width + margin.left + margin.right).attr("height", height + margin.top + margin.bottom).append("g").attr("transform", `translate(${margin.left},${margin.top})`);
        
        const x = d3.scaleBand().range([0, width]).padding(0.3);
        const y = d3.scaleLinear().range([height, 0]).domain([0, 35]);
        const xAxis = svg.append("g").attr("transform", `translate(0,${height})`);
        const yAxis = svg.append("g").call(d3.axisLeft(y));
        const tooltip = d3.select("#tooltip");

        function drawChart(filteredData) {
            let displayData = [...filteredData];
            if(!displayData.find(d => d.region === "Trung bình Cả nước")) {
                displayData.push({"region": "Trung bình Cả nước", "temp": NATIONAL_AVG_TEMP, "isNational": true});
            }
            x.domain(displayData.map(d => d.region));
            xAxis.transition().duration(500).call(d3.axisBottom(x)).selectAll("text").attr("transform", "translate(-10,10)rotate(-20)").style("text-anchor", "end");

            const bars = svg.selectAll(".bar-group").data(displayData, d => d.region);
            bars.exit().remove();
            bars.enter().append("rect").attr("class", d => d.isNational ? "bar-group bar-national" : "bar-group bar")
                .attr("x", d => x(d.region)).attr("width", x.bandwidth()).attr("y", height).attr("height", 0)
                .on("mouseover", (event, d) => { tooltip.transition().duration(200).style("opacity", 1); tooltip.html(`<strong>${d.region}</strong><br>${d.temp}°C`).style("left", (event.pageX + 10) + "px").style("top", (event.pageY - 20) + "px"); })
                .on("mouseout", () => tooltip.style("opacity", 0))
                .merge(bars).transition().duration(800)
                .attr("x", d => x(d.region)).attr("y", d => y(d.temp)).attr("height", d => height - y(d.temp));
        }

        d3.select("#regionFilter").on("change", function() {
            const val = d3.select(this).property("value");
            drawChart(val === "All" ? rawData : rawData.filter(d => d.region === val));
        });
        drawChart(rawData);
    </script>
</body>
</html>
