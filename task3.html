<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Task 3 - Heatmap Thời tiết</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background-color: #f5f5f5; }
        .chart-box { background-color: #fff; padding: 20px; border-radius: 10px; display: inline-block; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .heatmap-rect { stroke: #e2e8f0; cursor: pointer; }
        .heatmap-rect:hover { stroke: #333; stroke-width: 2px; }
        .tooltip { position: absolute; background: #333; color: #fff; padding: 5px 10px; border-radius: 4px; pointer-events: none; font-size: 12px; opacity: 0; }
        .filter-container { margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="chart-box">
        <h2>Tần suất thời tiết (Heatmap)</h2>
        <div class="filter-container">
            <label>Chọn Vùng: </label>
            <select id="regionFilter"></select>
        </div>
        <svg id="heatMap" width="800" height="400"></svg>
    </div>
    <div class="tooltip" id="tooltip"></div>

    <script>
        async function drawHeatMap() {
            const rawData = await d3.csv("df_weather_fixed_utf8_cleaned.csv");

            // 1. Lọc lấy 5 loại thời tiết phổ biến nhất để Heatmap không bị quá dài
            const counts = d3.rollup(rawData, v => v.length, d => d['day.condition.text']);
            const topConditions = Array.from(counts).sort((a,b) => b[1] - a[1]).slice(0, 5).map(d => d[0]);

            // 2. Gom nhóm dữ liệu theo Vùng và Thời tiết
            const grouped = d3.rollup(rawData.filter(d => topConditions.includes(d['day.condition.text'])), 
                v => v.length, 
                d => d['location.region'], 
                d => d['day.condition.text']
            );

            // 3. Chuyển đổi dữ liệu sang dạng mảng để D3 vẽ
            const heatData = [];
            for (let [region, condMap] of grouped) {
                for (let [cond, count] of condMap) {
                    heatData.push({ region, cond, count });
                }
            }

            // 4. Setup bộ lọc
            const regions = ["Tất cả", ...new Set(rawData.map(d => d['location.region']))];
            d3.select("#regionFilter").selectAll("option").data(regions).enter().append("option").text(d => d);

            const svg = d3.select("#heatMap");
            const width = 800, height = 300;
            const margin = { top: 20, right: 20, bottom: 80, left: 150 };
            
            const x = d3.scaleBand().range([margin.left, width - margin.right]).padding(0.05);
            const y = d3.scaleBand().range([height - margin.bottom, margin.top]).padding(0.05);
            const color = d3.scaleSequential(d3.interpolatePuBu).domain([0, d3.max(heatData, d => d.count)]);

            const tooltip = d3.select("#tooltip");

            function update(selectedRegion) {
                let displayData = selectedRegion === "Tất cả" ? heatData : heatData.filter(d => d.region === selectedRegion);
                
                x.domain(displayData.map(d => d.region));
                y.domain(topConditions);

                svg.selectAll("*").remove(); // Vẽ lại

                svg.selectAll(".rect").data(displayData).enter().append("rect")
                    .attr("class", "heatmap-rect")
                    .attr("x", d => x(d.region)).attr("width", x.bandwidth())
                    .attr("y", d => y(d.cond)).attr("height", y.bandwidth())
                    .attr("fill", "#fff")
                    .on("mouseover", function(event, d) {
                        d3.select(this).style("stroke", "#000");
                        tooltip.style("opacity", 1).html(`Vùng: ${d.region}<br>Thời tiết: ${d.cond}<br>Số ngày: <b>${d.count}</b>`);
                    })
                    .on("mousemove", event => tooltip.style("left", (event.pageX + 10) + "px").style("top", (event.pageY - 20) + "px"))
                    .on("mouseout", function() {
                        d3.select(this).style("stroke", "#e2e8f0");
                        tooltip.style("opacity", 0);
                    })
                    .transition().duration(800)
                    .attr("fill", d => color(d.count));

                svg.append("g").attr("transform", `translate(0,${height - margin.bottom})`)
                    .call(d3.axisBottom(x)).selectAll("text").attr("transform", "rotate(-20)").style("text-anchor", "end");
                svg.append("g").attr("transform", `translate(${margin.left},0)`).call(d3.axisLeft(y));
            }

            d3.select("#regionFilter").on("change", function() { update(this.value); });
            update("Tất cả");
        }
        drawHeatMap();
    </script>
</body>
</html>
