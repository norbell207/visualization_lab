<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Tổng Hợp</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #1a202c; }
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1400px; margin: 0 auto; }
        
        .card { background: #fff; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); padding: 15px; }
        .card-full { grid-column: 1 / -1; } /* Chiếm toàn bộ chiều ngang */
        
        iframe { width: 100%; border: none; border-radius: 8px; }
        .frame-small { height: 450px; }
        .frame-large { height: 550px; }
    </style>
</head>
<body>

    <h1>Báo Cáo Trực Quan Thời Tiết Việt Nam</h1>

    <div class="dashboard-grid">
        <div class="card">
            <iframe src="task2.html" class="frame-small"></iframe>
        </div>

        <div class="card">
            <iframe src="task3.html" class="frame-small"></iframe>
        </div>

        <div class="card card-full">
            <iframe src="task5.html" class="frame-large"></iframe>
        </div>
    </div>

</body>
</html>
